module:
  mounts:
    - source: assets
      target: assets
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts
    - source: static
      target: static

params:

  # Admin
  admin:
    fields:
      contact:
        - email
        - phone
        - fax
        - socials
      offer:
        - is_sold
        - price
        - price_sold
        - visits
        - date_sale

  # Front
  expertises:
    _merge: deep
    thumbnail:
      _merge: deep
      desktop: '636x273'
  persons:
    _merge: deep
    thumbnail:
      _merge: deep
      desktop: "306x372"
      mobile: "300x365"