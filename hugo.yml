module:
  mounts:
    - source: assets
      target: assets
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts
    - source: static
      target: static

params:

  # Admin
  admin:
    fields:
      contact:
        fields:
          - email
          - phone
          - fax
          - socials
      offer:
        fields:
          - is_sold
          - price
          - price_sold
          - visits
          - date_sale

  # Image
  persons:
    _merge: deep
    thumbnail:
      _merge: deep
      desktop: "306x372"
      mobile: "300x365"